<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;width:1920px;height:1080px;background:transparent;overflow:hidden}
  #box{position:absolute;left:0;right:0;top:180px;text-align:center;
       font-family:"Malgun Gothic",sans-serif;opacity:0}
  #num{color:#FFD700;font-size:150px;font-weight:800;
       text-shadow:0 4px 18px rgba(0,0,0,.55);letter-spacing:2px}
  #num .suffix{color:#fff;font-size:90px;font-weight:700}
  #label{color:#fff;font-size:34px;margin-top:2px;text-shadow:0 2px 8px rgba(0,0,0,.6)}
</style></head><body>
<div id="box"><div id="num"></div><div id="label"></div></div>
<script>
const q = new URLSearchParams(location.search);
const TO = parseFloat(q.get('to') || '100');
const SUFFIX = q.get('suffix') || '';
const PREFIX = q.get('prefix') || '';
const LABEL = q.get('label') || '';
const DUR = parseFloat(q.get('dur') || '2.5');
const COUNT = Math.min(1.3, DUR * .55);            // 숫자 올라가는 시간
document.getElementById('label').textContent = LABEL;
if(!LABEL) document.getElementById('label').style.display='none';
const easeOut = p => 1 - Math.pow(1 - p, 3);
window.seek = t => {
  const box = document.getElementById('box');
  const IN = .25, OUT = .35;
  let op = 1;
  if (t < IN) op = t / IN;
  else if (t > DUR - OUT) op = Math.max(0, (DUR - t) / OUT);
  box.style.opacity = op;
  const p = Math.min(1, t / COUNT);
  const val = Math.round(TO * easeOut(p));
  // 끝나는 순간 살짝 튀는 스케일
  const pop = (p >= 1 && t < COUNT + .25) ? 1 + .06 * (1 - (t - COUNT) / .25) : 1;
  const num = document.getElementById('num');
  num.style.transform = `scale(${pop})`;
  num.innerHTML = PREFIX + val.toLocaleString('ko-KR')
                + `<span class="suffix">${SUFFIX}</span>`;
};
</script></body></html>
