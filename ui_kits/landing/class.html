requestAnimationFrame(() => {
  const reveal = () => {
    const vh = window.innerHeight || document.documentElement.clientHeight;
    document.querySelectorAll(".reveal:not(.in)").forEach((el) => {
      const r = el.getBoundingClientRect();
      if (r.top < vh * 0.9 && r.bottom > 0) el.classList.add("in");
    });
  };
  reveal();
  window.addEventListener("scroll", reveal, { passive: true });
  window.addEventListener("resize", reveal);
  setTimeout(reveal, 200);
  setTimeout(reveal, 500);
  const updateCta = () => {
    const bar = document.getElementById("gcta"), blur = document.getElementById("gblur"), applyEl = document.getElementById("apply");
    if (!bar || !applyEl) return;
    const vh = window.innerHeight || document.documentElement.clientHeight;
    const show = window.scrollY > 560 && applyEl.getBoundingClientRect().top > vh * 0.75;
    bar.classList.toggle("cta-off", !show);
    blur.classList.toggle("cta-off", !show);
  };
  window.addEventListener("scroll", updateCta, { passive: true });
  setTimeout(updateCta, 300);
});

// Staggered word reveal (MengTo/skills staggered-word-reveal)
function splitWordReveal(element) {
  if (element.dataset.wordRevealReady === "true") return;
  const text = element.textContent || "";
  const parts = text.split(/(\s+)/);
  let wordIndex = 0;
  element.textContent = "";
  element.setAttribute("aria-label", text.trim());
  element.classList.add("word-reveal");
  parts.forEach((part) => {
    if (!part.trim()) { element.appendChild(document.createTextNode(part)); return; }
    const mask = document.createElement("span");
    mask.className = "word-reveal__mask";
    mask.setAttribute("aria-hidden", "true");
    const word = document.createElement("span");
    word.className = "word-reveal__word";
    word.style.setProperty("--word-index", wordIndex);
    word.textContent = part;
    mask.appendChild(word);
    element.appendChild(mask);
    wordIndex += 1;
  });
  element.dataset.wordRevealReady = "true";
}
function initWordReveals() {
  const els = Array.from(document.querySelectorAll("[data-word-reveal]"));
  if (!els.length) return;
  const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (reduceMotion || !("IntersectionObserver" in window)) {
    els.forEach((el) => el.classList.add("word-reveal", "is-visible"));
    return;
  }
  const io = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (!entry.isIntersecting) return;
      entry.target.classList.add("is-visible");
      io.unobserve(entry.target);
    });
  }, { threshold: 0.2, rootMargin: "0px 0px -10% 0px" });
  els.forEach((el) => { splitWordReveal(el); io.observe(el); });
}
setTimeout(initWordReveals, 250);
setTimeout(initWordReveals, 800);
